spring.config.import=optional:configserver:http://localhost:8888
server.port=8083
spring.application.name=reservation-service

spring.datasource.url=jdbc:mysql://localhost:3306/reservation_db
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

spring.cloud.openfeign.okhttp.enabled=true


spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.properties.spring.json.value.default.type=com.hotel.reservationservice.event.PaymentCompletedEvent
spring.kafka.consumer.properties.spring.json.use.type.headers=false

spring.kafka.consumer.group-id=reservation-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*


# ---------------- Payment-Service Circuit Breaker ----------------
resilience4j.circuitbreaker.instances.paymentServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.paymentServiceCB.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentServiceCB.slidingWindowSize=5
resilience4j.circuitbreaker.instances.paymentServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.paymentServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.paymentServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.paymentServiceCB.permittedNumberOfCallsInHalfOpenState=2

# ---------------- Room-Service Circuit Breaker ----------------
resilience4j.circuitbreaker.instances.roomServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.roomServiceCB.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.roomServiceCB.slidingWindowSize=5
resilience4j.circuitbreaker.instances.roomServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.roomServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.roomServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.roomServiceCB.permittedNumberOfCallsInHalfOpenState=2

# ---------------- Customer-Service Circuit Breaker ----------------
resilience4j.circuitbreaker.instances.customerServiceCB.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.customerServiceCB.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.customerServiceCB.slidingWindowSize=5
resilience4j.circuitbreaker.instances.customerServiceCB.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.customerServiceCB.failureRateThreshold=50
resilience4j.circuitbreaker.instances.customerServiceCB.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.customerServiceCB.permittedNumberOfCallsInHalfOpenState=2



# Expose health and metrics
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true